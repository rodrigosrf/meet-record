<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="settings-body">
    <div class="settings-layout">
        <aside class="settings-sidebar">
            <div class="sidebar-item active" data-tab="general">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <span>Geral</span>
            </div>
            <div style="margin-top: auto;">
                <button class="btn-close-settings" onclick="window.close()">Fechar</button>
            </div>
        </aside>

        <main class="settings-content">
            <!-- General Tab -->
            <div id="general-tab" class="tab-content active">
                <header>
                    <h2>Geral</h2>
                    <p class="subtitle">Configure o comportamento básico da aplicação.</p>
                </header>

                <div class="setting-group">
                    <h3>Prints de Reunião</h3>
                    <div class="setting-item">
                        <label for="screenshotInterval" class="label-text">Frequência de Captura</label>
                        <select id="screenshotInterval" class="form-select">
                            <option value="5">A cada 5 segundos</option>
                            <option value="15">A cada 15 segundos</option>
                            <option value="30">A cada 30 segundos</option>
                            <option value="60" selected>A cada 1 minuto</option>
                            <option value="300">A cada 5 minutos</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label class="checkbox-container">
                            <input type="checkbox" id="smartCapture" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">Smart Capture (Salvar apenas quando a tela mudar)</span>
                        </label>
                    </div>
                    <p class="help-text">Reduz drasticamente o número de arquivos salvos evitando imagens duplicadas.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="settings.js"></script>
</body>
</html>
